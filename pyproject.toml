[project]
requires-python = ">= 3.12"

[tool.ruff]
line-length = 120
preview = true
src = ["."]
exclude = [
  ".git",
  ".ty",
  ".ruff_cache",
  ".venv",
  "__snapshots__",
]

[tool.ruff.lint]
select = [
  # pycodestyle
  "E",
  # pyflakes
  "F",
  # pep8-naming
  "N",
  # flake8-unused-arguments
  "ARG",
  # pyupgrade
  "UP",
  # flake-bugbear
  "B",
  # flake8-builtins
  "A",
  # isort
  "I",
  # flake8-comprehensions
  "C4",
  # flake8-import-conventions
  "ICN",
  # flake8-pytest-style
  "PT",
  # flake8-simplify
  "SIM",
  # pandas-vet
  "PD",
]
ignore = [
  # Allow shadowing builtins on attributes.
  "A003",
  # Do not enforce max line length via linter. We have an autoformatter, and sometimes we
  # intentionally turn formatting off.
  "E501",
]
unfixable = [
  # Remove unused variables.
  "F841",
]

[tool.ty.src]
exclude = [
    "setup.py",
]

[tool.ty.environment]
python-version = "3.13"

[tool.pytest.ini_options]
addopts = [
  "--cov=.",
  "--cov-branch",
  "--import-mode=importlib",
  "--ignore=result",
]
pythonpath = "."
python_files = ["**/*_test.py"]
